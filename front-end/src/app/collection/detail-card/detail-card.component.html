<div class="modal-overlay" *ngIf="item" (click)="onClose()">
    
    <app-content-card (click)="$event.stopPropagation()" class="recipe-card-container" *ngIf="recipe">
        
        <button class="btn-close" (click)="onClose()">✖</button>
        <button class="btn-delete" (click)="onDelete()">🗑️</button>

        <div class="recipe-card-content-wrapper">
            
          <div class="left-column" >
            <div class="header">
              <div class="image-container" *ngIf="item.imageUrl">
                <img [src]="item.imageUrl" [alt]="item.name">
              </div>
              <h2>{{ item.name }}</h2>
            </div>

            <span class="badge category-badge"  [style.background-color]="getCategoryColor(recipe.category)">{{ recipe.category | titlecase }}</span>
                    
            <div class="info-section">
              <h3>Ingrédients de la recette</h3>

              <div class="ingredients-mini-grid">
                <app-ingredient-mini-item 
                  *ngFor="let ing of recipeIngredients" 
                  [ingredient]="ing">
                </app-ingredient-mini-item>
              </div>
          
            </div>

          </div>

          <div class="right-column" *ngIf="recipe && recipe.steps && recipe.steps.length > 0">
            <div class="info-section">
                <h3>Étapes de préparation</h3>
                <ol class="steps-grid">
                    <li *ngFor="let currentStep of orderedRecipeSteps">
                        <app-recipe-step-item [step]="currentStep"></app-recipe-step-item>
                    </li>
                </ol>
            </div>
          </div>

        </div>

    </app-content-card>

    <app-content-card (click)="$event.stopPropagation()" class="ingredient-card-container" *ngIf="ingredient">

      <button class="btn-close" (click)="onClose()">✖</button>
      <button class="btn-delete" (click)="onDelete()">🗑️</button>

      <div class="ingredient-card-content-wrapper">

          <div class="header">
              <div class="image-container" *ngIf="item.imageUrl">
                <img [src]="item.imageUrl" [alt]="item.name">
              </div>
              <h2>{{ item.name }}</h2>
          </div>
          <div *ngIf="ingredient">
            <div class="info-section">
              <h3>Rayon</h3>
              <span class="badge rayon-badge" [style.background-color]="getRayonColor(ingredient.rayon)">
                {{ getRayonLabel(ingredient.rayon) }}
              </span>
              <h3>Rangement cuisine</h3>
              <span class="badge rayon-badge" [style.background-color]="getRangementColor(ingredient.zoneStockage)">
                {{ getRangementLabel(ingredient.zoneStockage) }}
              </span>
            </div>
          </div>

        </div>

    </app-content-card>
</div>

<app-confirmation-modal
  *ngIf="showConfirmDelete"
  [questionText]="modalQuestionText"
  (cancel)="cancelDelete()"
  (confirm)="confirmDelete()">
</app-confirmation-modal>
